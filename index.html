<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Support Viral</title><style>
body{
  margin:0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#fbcfe8,#f9a8d4,#f5d0fe);
  color:#4b5563;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container{ max-width:420px; padding:20px; }

.card{
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.live{
  font-size:12px;
  color:#ec4899;
  margin-bottom:10px;
}

.quote{ margin:20px 0; font-size:18px; min-height:70px; }

button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#ec4899;
  color:white;
  cursor:pointer;
  margin:5px;
}

button:disabled{ background:#9ca3af; }

.small{ font-size:12px; margin-top:10px; }

</style></head>
<body><div class="container">
  <div class="card"><div class="live" id="live">💖 1.234 orang lagi butuh support sekarang</div>

<h2>Daily Support</h2>

<div class="quote" id="quote">Klik untuk ambil support hari ini</div>

<button id="btn" onclick="generate()">Ambil Support</button>
<button onclick="copyQuote()">Copy</button>
<button onclick="shareQuote()">Share</button>

<div class="small" id="info"></div>

<div class="small" id="streak"></div>

  </div>
</div><script>

// ===== DATA =====
const quotes = [
  "Kamu lagi capek, bukan gagal.",
  "Pelan itu gapapa, asal tetap jalan.",
  "Hari ini berat, tapi kamu masih bertahan.",
  "Gak semua orang kuat kayak kamu.",
  "Istirahat boleh, nyerah jangan.",
  "Kamu udah sejauh ini, jangan balik lagi.",
  "Tenang, semua ada waktunya.",
  "Kamu lagi proses jadi versi terbaikmu."
];

// ===== LIVE COUNTER (FAKE VIRAL) =====
setInterval(()=>{
  let num = Math.floor(Math.random()*2000)+500;
  document.getElementById('live').innerText = `💖 ${num} orang lagi butuh support sekarang`;
},2000);

// ===== DAILY LOCK =====
const today = new Date().toDateString();
let lastClick = localStorage.getItem('lastClick');

// ===== STREAK =====
let streak = parseInt(localStorage.getItem('streak')||0);
let lastDay = localStorage.getItem('lastDay');

if(lastDay !== today){
  streak++;
  localStorage.setItem('streak',streak);
  localStorage.setItem('lastDay',today);
}

document.getElementById('streak').innerText = `🔥 Streak: ${streak} hari`;

function generate(){
  if(lastClick === today){
    document.getElementById('info').innerText = "Kamu sudah ambil hari ini 💖";
    return;
  }

  let random = quotes[Math.floor(Math.random()*quotes.length)];
  document.getElementById('quote').innerText = random;

  localStorage.setItem('lastClick', today);
  document.getElementById('btn').disabled = true;
  document.getElementById('info').innerText = "Balik lagi besok ya 💕";
}

if(lastClick === today){
  document.getElementById('btn').disabled = true;
  document.getElementById('info').innerText = "Kamu sudah ambil hari ini 💖";
}

// ===== COPY =====
function copyQuote(){
  let text = document.getElementById('quote').innerText;
  navigator.clipboard.writeText(text);
  alert("Disalin 💕");
}

// ===== SHARE =====
function shareQuote(){
  let text = document.getElementById('quote').innerText;
  if(navigator.share){
    navigator.share({text});
  } else {
    copyQuote();
  }
}

</script></body>
</html>
