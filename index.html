<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tes Seberapa Miskin Lu</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #2b2b2b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  background: #202020;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1;}
}

h1 {
  font-size: 20px;
}

.progress {
  height: 6px;
  background: #333;
  border-radius: 10px;
  margin: 15px 0;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#ff4d6d,#ff9a9e);
  transition: 0.4s;
}

.question {
  margin: 15px 0;
  font-size: 17px;
}

button {
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #2f2f2f;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #444;
  transform: scale(1.02);
}

.result {
  font-size: 18px;
  margin: 20px 0;
  white-space: pre-line;
}

.share-btn {
  background: #25D366;
  font-weight: bold;
}

.copy-btn {
  background: #555;
}

.cta {
  background: #ff4d6d;
  font-weight: bold;
}

.footer {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>💸 Tes Seberapa Miskin Lu</h1>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="question" id="q">Loading...</div>
  <div id="a"></div>
</div>

<script>
const data = [
{q:"Saldo rekening sekarang?",a:[
["Di atas 10 juta",0],
["1-10 juta",2],
["Di bawah 1 juta",4],
["Nunggu keajaiban",6]
]},
{q:"Kalau lapar malam?",a:[
["Order bebas",0],
["Cek saldo dulu",2],
["Air putih cukup",4],
["Tidur biar lupa",6]
]},
{q:"Isi dompet?",a:[
["Tebal banget",0],
["Lumayan",2],
["Tipis",4],
["Kosong + struk",6]
]},
{q:"Pemasukan?",a:[
["Stabil",0],
["Kadang ada",2],
["Jarang",4],
["Mimpi doang",6]
]},
{q:"Kalau diskon?",a:[
["Bodo amat",0],
["Liat dulu",2],
["Wajib ambil",4],
["Nunggu gratis",6]
]}
];

let i=0, score=0;

function load(){
let d=data[i];
q.innerText=d.q;

a.innerHTML="";
d.a.forEach(x=>{
let btn=document.createElement("button");
btn.innerText=x[0];
btn.onclick=()=>next(x[1]);
a.appendChild(btn);
});

bar.style.width=(i/data.length*100)+"%";
}

function next(s){
score+=s;
i++;

if(navigator.vibrate) navigator.vibrate(50);

if(i<data.length){
load();
}else{
result();
}
}

function result(){
let text="", level="";

if(score<=6){
level="🤑 Sultan Tersembunyi";
text="Lu aman... tapi jangan lengah.";
}else if(score<=12){
level="🙂 Aman Tipis";
text="Masih hidup, tapi rawan jatuh.";
}else if(score<=18){
level="😐 Ngambang";
text="Lu lagi di fase bahaya finansial.";
}else{
level="💀 Miskin Brutal";
text="Jujur... kondisi lu butuh perubahan.";
}

let shareText = `Hasil tes gue:\n${level}\n${text}\n\nCoba lu juga 😭`;

document.querySelector(".container").innerHTML=`
<h1>${level}</h1>
<div class="result">${text}</div>

<button class="share-btn" onclick="share()">📲 Share WhatsApp</button>
<button class="copy-btn" onclick="copy()">📋 Copy Hasil</button>

<button class="cta" onclick="action()">🚀 Ubah Nasib Gue</button>

<button onclick="location.reload()">🔄 Ulang</button>

<div class="footer">Kadang bukan rezeki yang kurang… tapi cara lu cari uang.</div>
`;

window.share = function(){
window.open("https://wa.me/?text="+encodeURIComponent(shareText));
}

window.copy = function(){
navigator.clipboard.writeText(shareText);
alert("Disalin!");
}

window.action = function(){
window.open("https://wa.me/6283878348853?text=Gue mau mulai cari cuan, ajarin dong");
}
}

load();
</script>

</body>
</html>
