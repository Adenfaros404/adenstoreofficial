<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Node</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
}

#app{
    padding:20px;
}

.line{
    margin:3px 0;
    animation:fade .3s;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

.red{color:red;}
.yellow{color:yellow;}
.green{color:#00ffcc;}

.glitch{
    animation:glitch .15s infinite;
}

@keyframes glitch{
    0%{opacity:1;}
    50%{opacity:.3;}
    100%{opacity:1;}
}
</style>
</head>

<body>
<div id="app"></div>

<script>
const app = document.getElementById("app");

function line(t,cls=""){
    let d=document.createElement("div");
    d.className="line "+cls;
    d.innerText=t;
    app.appendChild(d);
    app.scrollTop = app.scrollHeight;
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

// random generator biar keliatan real
function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function fakeIP(){
    return `${rand([36,182,103,114])}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
}

// sequence engine
async function seq(title, steps, speed=400){
    line(">> "+title,"yellow");
    for(let s of steps){
        line(s);
        await wait(speed + Math.random()*300);
    }
    line("✔ DONE","green");
    await wait(500);
}

// MAIN FLOW
async function run(){

    line("BOOTING SYSTEM...");
    await wait(800);

    await seq("INITIALIZING CORE",[
        "Loading kernel module...",
        "Mounting virtual nodes...",
        "Syncing memory blocks..."
    ]);

    await seq("NETWORK SCAN",[
        "Detecting interface...",
        "Assigning IP...",
        "IP: "+fakeIP(),
        "Gateway resolved",
        "Pinging nodes..."
    ]);

    await seq("DEVICE ANALYSIS",[
        "Reading device signature...",
        "OS detected: Android",
        "Browser engine: Chromium",
        "User fingerprint matched"
    ]);

    await seq("SECURITY BYPASS",[
        "Checking firewall...",
        "Injecting bypass...",
        "Escalating privilege...",
        "Root access simulated"
    ]);

    await seq("DATA EXTRACTION",[
        "Scanning storage...",
        "Indexing media...",
        "Locating chat database...",
        "Extracting metadata..."
    ],300);

    // mulai naik tensi
    line("⚠️ ANOMALY DETECTED ⚠️","red glitch");
    await wait(1200);

    await seq("TRACE SYSTEM",[
        "Reverse tracking initiated...",
        "Cross-referencing nodes...",
        "Target lock acquired"
    ],250);

    line("USER IDENTIFIED","red");
    await wait(800);

    await seq("UPLOAD PROCESS",[
        "Compressing data...",
        "Encrypting packets...",
        "Sending to remote server..."
    ],200);

    // peak panic
    line("⚠️ FULL ACCESS GRANTED ⚠️","red glitch");
    await wait(1500);

    line("Monitoring activity...");
    await wait(800);
    line("Recording session...");
    await wait(800);

    // twist pelan
    await wait(1500);

    line("");
    line("...");
    await wait(1000);

    line("😈 Santai bro...");
    await wait(1000);

    line("Lu ga lagi di-hack.");
    await wait(1000);

    line("Ini cuma prank 🤣");
    await wait(1000);

    line("Tapi tadi sempet panik kan?");
}

run();
</script>
</body>
</html>
