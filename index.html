<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Kuliah</title>
<meta name="theme-color" content="#0f172a"><style>
:root{
  --bg1:#0f172a;
  --bg2:#1e293b;
  --accent:#3b82f6;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
  background: linear-gradient(135deg,var(--bg2),var(--bg1));
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  transition: background 0.6s ease;
}

.container{
  max-width:420px;
  width:100%;
  padding:22px;
}

.card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:22px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1{
  font-size:22px;
  margin-bottom:10px;
}

.sub{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:15px;
}

.quote{
  margin:20px 0;
  font-size:18px;
  line-height:1.4;
  color:#e2e8f0;
  min-height:70px;
  transition:0.3s;
}

.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{ transform:translateY(-2px) }

.secondary{
  background:#334155;
}

.small{
  font-size:12px;
  color:#64748b;
  margin-top:15px;
}

.fade{ opacity:0; transform:translateY(6px)}
.show{ opacity:1; transform:translateY(0)}

</style></head>
<body><div class="container">
  <div class="card">
    <h1>🎓 Support Buat Kamu yang Lagi Kuliah</h1>
    <div class="sub" id="meta">Hari ke-0 • 0 kali buka</div><div class="quote fade" id="quote">Memuat support...</div>

<div class="controls">
  <button onclick="generate()">Kasih Support</button>
  <button class="secondary" onclick="copyQuote()">Copy</button>
  <button class="secondary" onclick="shareQuote()">Share</button>
</div>

<div class="small">Simpan di HP (Add to Home Screen) biar tiap hari dapet support.</div>

  </div>
</div><script>
// ===== DATA =====
const quotes = [
  "Capek itu pasti, berhenti itu pilihan.",
  "Lu lagi berjuang, bukan gagal.",
  "Pelan ga masalah, yang penting ga berhenti.",
  "Orang lain santai, lu lagi bangun masa depan.",
  "Hari berat bukan berarti hidup lu gagal.",
  "Lu ga harus kuat terus, tapi jangan nyerah terus.",
  "Kuliah berat, tapi lu lebih kuat.",
  "Ga semua orang ngerti perjuangan lu, tapi lu tau kenapa lu mulai.",
  "Sedikit hari ini > nol sama sekali.",
  "Fokus 1 hal kecil, selesaiin. Itu udah menang."
];

const gradients = [
  ['#1e293b','#0f172a'],
  ['#0f172a','#020617'],
  ['#1f2937','#020617'],
  ['#111827','#0b1220']
];

// ===== STATE (LOCAL) =====
let opens = parseInt(localStorage.getItem('opens')||'0');
let dayStart = localStorage.getItem('dayStart');
let streak = parseInt(localStorage.getItem('streak')||'0');

const today = new Date().toDateString();
if(dayStart !== today){
  // new day
  streak = (dayStart ? streak+1 : 1);
  localStorage.setItem('streak',streak);
  localStorage.setItem('dayStart',today);
}

opens++;
localStorage.setItem('opens',opens);

function updateMeta(){
  document.getElementById('meta').innerText = `Hari ke-${streak} • ${opens} kali buka`;
}
updateMeta();

// ===== RENDER =====
function pick(){
  return quotes[Math.floor(Math.random()*quotes.length)];
}

function setBg(){
  const g = gradients[Math.floor(Math.random()*gradients.length)];
  document.body.style.background = `linear-gradient(135deg, ${g[0]}, ${g[1]})`;
}

function generate(){
  const el = document.getElementById('quote');
  el.classList.remove('show');
  el.classList.add('fade');

  setTimeout(()=>{
    el.innerText = pick();
    setBg();
    el.classList.remove('fade');
    el.classList.add('show');
  },120);
}

// first load auto
window.onload = ()=>{
  generate();
};

// ===== ACTIONS =====
function copyQuote(){
  const text = document.getElementById('quote').innerText;
  navigator.clipboard.writeText(text);
  alert('Disalin 👍');
}

function shareQuote(){
  const text = document.getElementById('quote').innerText;
  if(navigator.share){
    navigator.share({text});
  } else {
    copyQuote();
  }
}

</script></body>
</html>
