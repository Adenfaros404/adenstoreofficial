<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 Viral Gabut Machine</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#0f0f1a,#1f1f3a);
      color: white;
      text-align: center;
    }h1 {
  font-size: 28px;
}

.container {
  padding: 20px;
}

.live {
  color: #00ff9d;
  font-size: 14px;
  margin-bottom: 10px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg,#ff4757,#ff6b81);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
  animation: fadeIn 0.5s;
}

.hidden { display:none; }

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px)}
  to {opacity:1; transform:translateY(0)}
}

.shake {
  animation: shake 0.3s;
}

@keyframes shake {
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}

.cta {
  margin-top:20px;
  background:#00c853;
}

  </style>
</head>
<body><div class="container">  <div class="live" id="liveCounter">🔥 12.391 orang lagi main sekarang</div>  <h1>😈 VIRAL GABUT MACHINE</h1>
  <p>Pilih mode hiburan:</p><button onclick="show('tebak')">Tebak Ngaco</button> <button onclick="show('roast')">Roasting Brutal</button> <button onclick="show('hoki')">Cek Hoki</button>

  <!-- Tebak -->  <div id="tebak" class="card hidden">
    <h2>10 + 10 = ?</h2>
    <input id="jawaban" placeholder="Jawab disini">
    <br>
    <button onclick="cekJawaban()">Gas Jawab</button>
    <p id="hasil"></p>
  </div>  <!-- Roast -->  <div id="roast" class="card hidden">
    <h2>Roasting Mode Aktif</h2>
    <button onclick="roast()">Hajar Gue</button>
    <p id="roastText"></p>
  </div>  <!-- Hoki -->  <div id="hoki" class="card hidden">
    <h2>Cek Keberuntungan</h2>
    <button onclick="hoki()">Cek Sekarang</button>
    <p id="hokiText"></p>
  </div>  <!-- CTA BISNIS --><button class="cta" onclick="redirect()">🔥 Coba Hoki Kuota Murah</button>

</div><script>

// FAKE LIVE COUNTER
setInterval(()=>{
  let angka = Math.floor(Math.random()*5000)+8000;
  document.getElementById('liveCounter').innerText = `🔥 ${angka.toLocaleString()} orang lagi main sekarang`;
},2000);

function show(id){
  document.getElementById('tebak').classList.add('hidden');
  document.getElementById('roast').classList.add('hidden');
  document.getElementById('hoki').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function cekJawaban(){
  let jwb = document.getElementById('jawaban').value;
  let hasil = document.getElementById('hasil');

  if(jwb=="2"){
    hasil.innerText = "BENAR 😭 karena logika gabut";
  } else {
    hasil.innerText = "SALAH 😈 otak lu terlalu normal";
    document.body.classList.add('shake');
    setTimeout(()=>document.body.classList.remove('shake'),300);
  }
}

function roast(){
  let list=[
    "Lu bukan gagal... lu cuma belum pernah serius 😭",
    "Rencana lu banyak, tapi aksi lu nihil 😈",
    "Lu nunggu motivasi, padahal yang lu butuh itu tekanan 😏",
    "Hidup lu stuck karena lu sendiri santai 😭"
  ];
  let r=list[Math.floor(Math.random()*list.length)];
  document.getElementById('roastText').innerText=r;
}

function hoki(){
  let list=[
    "Hoki 5% — jangan sok jago hari ini 😭",
    "Hoki 40% — masih bisa lah 😏",
    "Hoki 80% — gas ambil peluang 😈",
    "Hoki 1% — mending diem 😭"
  ];
  let r=list[Math.floor(Math.random()*list.length)];
  document.getElementById('hokiText').innerText=r;
}

function redirect(){
  alert("Masuk ke dunia cuan... 😈");
  window.location.href = "https://wa.me/6283878348853";
}

</script></body>
  </html>
