<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Breach</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
}

#screen {
    padding: 20px;
    height: 100vh;
    overflow-y: auto;
}

.glitch {
    color: red;
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% {opacity:1;}
    50% {opacity:0.3;}
    100% {opacity:1;}
}

button {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 25px;
    font-size: 16px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
}
</style>
</head>

<body>

<div id="screen"></div>
<button onclick="startHack()">INITIATE SYSTEM</button>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
let clicked = false;

function typeText(text, speed = 30) {
    return new Promise(resolve => {
        let i = 0;
        let screen = document.getElementById("screen");

        function typing() {
            if (i < text.length) {
                screen.innerHTML += text.charAt(i);
                i++;
                setTimeout(typing, speed);
            } else {
                screen.innerHTML += "<br>";
                resolve();
            }
        }
        typing();
    });
}

async function startHack() {
    if(clicked) return alert("SYSTEM LOCKED. WAIT 24 HOURS.");
    clicked = true;

    document.querySelector("button").style.display = "none";
    document.getElementById("sound").play();

    let nomor = prompt("Masukkan target (nomor HP):") || "UNKNOWN";

    await typeText("Connecting to satellite...");
    await typeText("Bypassing firewall...");
    await typeText("Injecting payload...");
    await typeText("Target detected: " + nomor);

    await typeText("Scanning device...");
    await typeText("Accessing WhatsApp database...");
    await typeText("Decrypting messages...");

    await typeText("⚠️ WARNING: TRACE DETECTED ⚠️", 20);

    document.getElementById("screen").classList.add("glitch");

    await typeText("IP LOCATION FOUND");
    await typeText("Uploading data to server...");

    await typeText("✔ ACCESS GRANTED", 50);

    await typeText("Downloading private data...");
    await typeText("Camera access: ENABLED");
    await typeText("Microphone access: ENABLED");

    await typeText("SYSTEM BREACHED SUCCESSFULLY");

    await typeText("😈 YOU ARE BEING WATCHED 😈", 80);
}
</script>

</body>
</html>
