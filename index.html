<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anime Love Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url('https://wallpaperaccess.com/full/2213426.jpg') no-repeat center/cover;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* overlay biar readable */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
}

/* card */
.container {
    position: relative;
    margin-top: 80px;
    z-index: 2;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 20px;
    display: inline-block;
    box-shadow: 0 0 30px pink;
    animation: fadeIn 1.5s;
}

input {
    padding: 10px;
    margin: 5px;
    width: 250px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: pink;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

#hasil {
    margin-top: 20px;
}

/* animasi */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: naik 5s linear infinite;
}

@keyframes naik {
    0% {transform: translateY(0); opacity:1;}
    100% {transform: translateY(-800px); opacity:0;}
}

/* glitch effect */
.glitch {
    animation: glitch 0.3s;
}

@keyframes glitch {
    0% {transform: translate(0);}
    20% {transform: translate(-3px,3px);}
    40% {transform: translate(3px,-3px);}
    60% {transform: translate(-3px,3px);}
    100% {transform: translate(0);}
}
</style>
</head>

<body>

<audio autoplay loop>
    <source src="https://files.catbox.moe/6q7v9p.mp3" type="audio/mp3">
</audio>

<div class="container">
    <div class="card" id="card">
        <h2>💖 Anime Love Checker 💖</h2>

        <input id="nama1" placeholder="Nama kamu"><br>
        <input id="nama2" placeholder="Nama dia"><br>

        <button onclick="cek()">Cek Jodoh</button>

        <div id="hasil"></div>
        <br>
        <button onclick="shareWA()">Share ke WA</button>
    </div>
</div>

<script>
function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function cek(){
    let n1 = document.getElementById("nama1").value;
    let n2 = document.getElementById("nama2").value;
    let hasil = document.getElementById("hasil");
    let card = document.getElementById("card");

    let persen = Math.floor(Math.random()*100);

    let kata = [
        "Kalian cocok, tapi ego sering jadi penghalang.",
        "Hubungan ini kuat, asal saling ngerti.",
        "Banyak rasa, tapi belum tentu bisa bersama.",
        "Diam-diam saling suka, tapi gengsi.",
        "Saling butuh, tapi sering menyakiti."
    ];

    hasil.innerHTML = `
    <p><b>${n1} ❤️ ${n2}</b></p>
    <p>Love: ${persen}%</p>
    <p><i>"${rand(kata)}"</i></p>
    `;

    glitchEffect(card);
    spawnLove();
}

function spawnLove(){
    for(let i=0;i<15;i++){
        let h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "💖";
        h.style.left = Math.random()*100 + "vw";
        document.body.appendChild(h);

        setTimeout(()=>h.remove(),5000);
    }
}

function glitchEffect(el){
    el.classList.add("glitch");
    setTimeout(()=>el.classList.remove("glitch"),300);
}

function shareWA(){
    let text = document.getElementById("hasil").innerText;
    let link = "https://wa.me/?text=" + encodeURIComponent(text);
    window.open(link);
}
</script>

</body>
</html>
