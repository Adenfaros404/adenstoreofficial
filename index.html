<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Scan Kodam</title>

<style>
body {
    margin:0;
    font-family:Poppins;
    color:#00ffcc;
    text-align:center;
    background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba') no-repeat center/cover;
}

/* overlay */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    top:0;
    left:0;
}

/* container */
.container {
    max-width:400px;
    margin:auto;
    margin-top:60px;
    position:relative;
    z-index:2;
}

.card {
    background: rgba(0,255,200,0.08);
    backdrop-filter: blur(12px);
    border-radius:20px;
    padding:20px;
    box-shadow: 0 0 30px rgba(0,255,200,0.3);
}

input {
    width:90%;
    padding:12px;
    margin:8px;
    border:none;
    border-radius:10px;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#00ffcc;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

#hasil {
    margin-top:20px;
}

.bar {
    height:5px;
    width:0%;
    background:#00ffcc;
    transition:2s;
}

/* animasi love */
.heart {
    position:fixed;
    bottom:-10px;
    font-size:18px;
    animation:up 5s linear infinite;
}

@keyframes up {
    0% {transform:translateY(0);opacity:1;}
    100% {transform:translateY(-800px);opacity:0;}
}

/* watermark */
.watermark {
    margin-top:20px;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<audio id="sound">
<source src="https://files.catbox.moe/6q7v9p.mp3" type="audio/mp3">
</audio>

<div class="container">
<div class="card">

<h2>⚡ AI Scan Energi & Kodam ⚡</h2>

<p id="liveUser">👥 1,234 orang sedang menggunakan</p>

<input id="nama" placeholder="Nama lengkap">
<input type="date" id="tgl">

<button onclick="scan()">Mulai Analisa</button>

<div class="bar" id="bar"></div>

<div id="hasil"></div>

<p class="watermark">karya web. Mas AdenGanteng</p>

</div>
</div>

<script>
let kodam = ["Naga Hitam","Macan Bayangan","Serigala Malam","Garuda Emas"];
let sifat = [
"Protektif tapi emosional.",
"Kuat tapi sulit dikendalikan.",
"Tenang tapi mematikan.",
"Setia tapi mudah terpancing."
];

function hash(nama,tgl){
    let val = nama.length + new Date(tgl).getDate();
    return val;
}

/* LIMIT 3x */
function cekLimit(){
    let today = new Date().toDateString();
    let data = JSON.parse(localStorage.getItem("limitKodam")) || {};

    if(data.date !== today){
        data = {date: today, count: 0};
    }

    if(data.count >= 3){
        return false;
    }

    data.count++;
    localStorage.setItem("limitKodam", JSON.stringify(data));
    return true;
}

function scan(){
    let hasil = document.getElementById("hasil");
    let bar = document.getElementById("bar");
    let sound = document.getElementById("sound");

    if(!cekLimit()){
        hasil.innerHTML = `
        <h3>⚠️ Batas Analisa Habis</h3>
        <p>Sistem mendeteksi energi kamu belum stabil.</p>
        <p>Kamu bisa menunggu reset besok atau lanjutkan via akses khusus.</p>

        <a href="https://wa.me/6283878348853?text=Halo%20saya%20mau%20lanjut%20scan%20kodam"
        style="display:inline-block;margin-top:10px;padding:10px 20px;
        background:#00ffcc;color:black;border-radius:20px;text-decoration:none;">
        ⚡ Lanjut via WhatsApp
        </a>
        `;
        return;
    }

    let nama = document.getElementById("nama").value;
    let tgl = document.getElementById("tgl").value;

    sound.play();

    hasil.innerHTML = "🔍 Menganalisa energi...";
    bar.style.width = "100%";

    setTimeout(()=>{
        let h = hash(nama,tgl);

        let k = kodam[h % kodam.length];
        let s = sifat[h % sifat.length];

        hasil.innerHTML = `
        <h3>${k}</h3>
        <p>Tipe: Penjaga Energi</p>
        <p>Sifat: ${s}</p>
        <p><i>"Energi ini kuat, tapi jika tidak dikendalikan bisa berbalik menyerang dirimu."</i></p>
        `;

        spawnLove();
    },2000);
}

/* animasi */
function spawnLove(){
    for(let i=0;i<8;i++){
        let h = document.createElement("div");
        h.className="heart";
        h.innerHTML="💖";
        h.style.left=Math.random()*100+"vw";
        document.body.appendChild(h);

        setTimeout(()=>h.remove(),5000);
    }
}

/* fake ramai */
setInterval(()=>{
    let num = Math.floor(Math.random()*5000)+1000;
    document.getElementById("liveUser").innerText =
    "👥 "+num+" orang sedang menggunakan";
},2000);
</script>

</body>
</html>
