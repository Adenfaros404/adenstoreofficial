<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Support System</title>  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">  <style>
    * { box-sizing: border-box; margin:0; padding:0 }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg,#0f172a,#020617);
      color: #e2e8f0;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      height: 100vh;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 18px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .menu button {
      background: none;
      border: none;
      color: #94a3b8;
      text-align: left;
      cursor: pointer;
      padding: 10px;
      border-radius: 8px;
    }

    .menu button:hover {
      background: rgba(255,255,255,0.05);
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    button.primary {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg,#3b82f6,#2563eb);
      color: white;
      cursor: pointer;
    }

    .chat {
      height: 200px;
      overflow-y: auto;
      font-size: 14px;
      margin-top: 10px;
    }

    .streak {
      font-size: 28px;
      font-weight: bold;
      color: #22c55e;
    }

  </style></head>
<body><div class="sidebar">
  <h2>🎓 Support System</h2>
  <div class="menu">
    <button onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('task')">Task Manager</button>
    <button onclick="show('focus')">Focus Mode</button>
    <button onclick="show('mental')">Mental Support</button>
  </div>
</div><div class="main">  <div class="header">
    <div class="title">Dashboard</div>
  </div>  <!-- DASHBOARD -->  <div id="dashboard" class="page">
    <div class="grid">
      <div class="card">
        <h3>🔥 Streak Konsistensi</h3>
        <div class="streak" id="streak">0 Hari</div>
      </div><div class="card">
    <h3>📊 Status Hari Ini</h3>
    <p id="status">Belum mulai apa-apa</p>
  </div>
</div>

  </div>  <!-- TASK -->  <div id="task" class="page" style="display:none">
    <div class="card">
      <h3>Task Harian</h3>
      <input id="taskInput" placeholder="Tambah tugas...">
      <div id="taskList"></div>
    </div>
  </div>  <!-- FOCUS -->  <div id="focus" class="page" style="display:none">
    <div class="card">
      <h3>Focus Timer</h3>
      <div id="timer">25:00</div>
      <button class="primary" onclick="startTimer()">Mulai Fokus</button>
    </div>
  </div>  <!-- MENTAL -->  <div id="mental" class="page" style="display:none">
    <div class="card">
      <h3>Curhat Anonim</h3>
      <div class="chat" id="chat"></div>
      <input id="chatInput" placeholder="Tulis isi pikiran..." onkeypress="if(event.key==='Enter') send()">
    </div>
  </div></div><script>

// NAVIGATION
function show(page){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(page).style.display='block';
}

// TASK SYSTEM (SAVE)
let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
const taskInput = document.getElementById('taskInput');

taskInput.addEventListener('keypress', e=>{
  if(e.key==='Enter'){
    tasks.push(taskInput.value);
    localStorage.setItem('tasks',JSON.stringify(tasks));
    taskInput.value='';
    renderTask();
  }
});

function renderTask(){
  let html='';
  tasks.forEach(t=> html+=`<p>- ${t}</p>`);
  document.getElementById('taskList').innerHTML=html;
}
renderTask();

// TIMER
let time=1500, interval;
function startTimer(){
  clearInterval(interval);
  interval=setInterval(()=>{
    time--;
    let m=Math.floor(time/60);
    let s=time%60;
    document.getElementById('timer').innerText=`${m}:${s<10?'0':''}${s}`;
    if(time<=0){
      clearInterval(interval);
      updateStreak();
    }
  },1000);
}

// STREAK
let streak = localStorage.getItem('streak') || 0;
document.getElementById('streak').innerText = streak + " Hari";

function updateStreak(){
  streak++;
  localStorage.setItem('streak',streak);
  document.getElementById('streak').innerText = streak + " Hari";
  document.getElementById('status').innerText = "Hari produktif";
}

// CHAT
function send(){
  let input=document.getElementById('chatInput');
  let chat=document.getElementById('chat');

  chat.innerHTML += `<p>🧑 ${input.value}</p>`;

  setTimeout(()=>{
    chat.innerHTML += `<p>🤖 Lu capek bukan berarti lu gagal. Lanjut pelan aja.</p>`;
    chat.scrollTop=chat.scrollHeight;
  },700);

  input.value='';
}

</script></body>
      </html>
