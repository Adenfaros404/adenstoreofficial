
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access</title>

<style>
body {
    margin:0;
    background: radial-gradient(circle, #050505, #000000);
    color:#00ffcc;
    font-family: monospace;
    overflow:hidden;
}

#container {
    padding:20px;
}

.line {
    margin:5px 0;
    opacity:0;
    animation: fade 0.5s forwards;
}

@keyframes fade {
    to {opacity:1;}
}

.glitch {
    color:red;
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}

#progress {
    width:100%;
    height:10px;
    background:#111;
    margin-top:20px;
    border-radius:10px;
}

#bar {
    width:0%;
    height:100%;
    background:#00ffcc;
    border-radius:10px;
    transition:0.3s;
}

#startBtn {
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    background:#00ffcc;
    border:none;
    color:black;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="container"></div>

<div id="progress"><div id="bar"></div></div>

<button id="startBtn" onclick="start()">START SYSTEM</button>

<script>
let c = document.getElementById("container");
let bar = document.getElementById("bar");

function addLine(text, cls=""){
    let d = document.createElement("div");
    d.className="line "+cls;
    d.innerText=text;
    c.appendChild(d);
}

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function start(){
    document.getElementById("startBtn").style.display="none";

    let target = prompt("Masukkan target:") || "UNKNOWN";

    let steps = [
        "Menghubungkan ke server...",
        "Validasi target: "+target,
        "Melewati firewall...",
        "Injecting system...",
        "Scanning database...",
        "Mengakses modul sistem...",
        "Decrypting data...",
        "Sinkronisasi node...",
        "Finalizing access..."
    ];

    for(let i=0;i<steps.length;i++){
        addLine(steps[i]);
        bar.style.width = ((i+1)/steps.length*100)+"%";
        await delay(700);
    }

    addLine("⚠️ AKSES INTI TERBUKA ⚠️","glitch");
    await delay(1500);

    addLine("Mengambil data sensitif...");
    await delay(1000);

    addLine("Mengirim ke server pusat...");
    await delay(1200);

    addLine("✔ SELESAI");
    await delay(1000);

    // PLOT TWIST
    addLine("");
    addLine("😈 Santai bro...");
    addLine("Ini cuma prank wkwk 🤣");
    addLine("Ga ada data yang diambil.");

}
</script>

</body>
</html>
