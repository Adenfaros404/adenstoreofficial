<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Jodoh Finder</title>

<style>
body {
    margin:0;
    font-family:Poppins;
    background: linear-gradient(135deg,#ff9a9e,#a18cd1);
    color:white;
    text-align:center;
}

.container {
    padding:20px;
    margin-top:50px;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:20px;
}

input {
    width:90%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin:10px 0;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    background:white;
    color:purple;
    font-weight:bold;
}

#hasil img {
    width:120px;
    border-radius:50%;
    margin-top:10px;
}

.bar {
    height:5px;
    width:0%;
    background:pink;
    transition:2s;
}

/* love animation */
.heart {
    position:fixed;
    bottom:-10px;
    font-size:18px;
    animation:up 5s linear infinite;
}

@keyframes up {
    0% {transform:translateY(0);opacity:1;}
    100% {transform:translateY(-800px);opacity:0;}
}
</style>
</head>

<body>

<!-- sound -->
<audio id="sound">
<source src="https://files.catbox.moe/6q7v9p.mp3" type="audio/mp3">
</audio>

<div class="container">
<div class="card">

<h2>💖 AI Cari Jodohmu 💖</h2>
<p id="counter">👥 1,284 orang lagi cek jodoh...</p>

<input id="nama" placeholder="Masukkan nama kamu">
<button onclick="scan()">Cari Sekarang</button>

<div class="bar" id="bar"></div>
<div id="hasil"></div>

<button onclick="shareWA()">Share ke WA</button>

</div>
</div>

<script>
let namaList = ["Alya","Nadia","Salsa","Rina","Dinda","Putri","Lala"];
let sifat = [
"Dia sabar tapi overthinking.",
"Dia setia tapi butuh diyakinkan.",
"Dia cuek tapi perhatian.",
"Dia kuat tapi sering menyembunyikan perasaan."
];

let foto = [
"https://i.pinimg.com/564x/9c/6b/ae/9c6bae0a.jpg",
"https://i.pinimg.com/564x/a5/11/33/a51133a.jpg",
"https://i.pinimg.com/564x/fc/2b/45/fc2b45a.jpg"
];

function hashNama(nama){
    let h=0;
    for(let i=0;i<nama.length;i++){
        h += nama.charCodeAt(i);
    }
    return h;
}

function scan(){
    let nama = document.getElementById("nama").value;
    let hasil = document.getElementById("hasil");
    let bar = document.getElementById("bar");
    let sound = document.getElementById("sound");

    sound.play();

    hasil.innerHTML = "🔍 AI sedang mencari pasangan terbaik...";
    bar.style.width = "100%";

    let h = hashNama(nama);

    setTimeout(()=>{
        let pasangan = namaList[h % namaList.length];
        let persen = (h % 50) + 50; // biar minimal 50%
        let sifatOut = sifat[h % sifat.length];
        let fotoOut = foto[h % foto.length];

        hasil.innerHTML = `
        <h3>${pasangan}</h3>
        <img src="${fotoOut}">
        <p>Kecocokan: ${persen}%</p>
        <p>${sifatOut}</p>
        `;

        spawnLove();
    },2000);
}

function spawnLove(){
    for(let i=0;i<10;i++){
        let h = document.createElement("div");
        h.className="heart";
        h.innerHTML="💖";
        h.style.left=Math.random()*100+"vw";
        document.body.appendChild(h);

        setTimeout(()=>h.remove(),5000);
    }
}

function shareWA(){
    let text = document.getElementById("hasil").innerText;
    window.open("https://wa.me/?text="+encodeURIComponent(text));
}

/* fake counter */
setInterval(()=>{
    let el = document.getElementById("counter");
    let num = Math.floor(Math.random()*2000)+1000;
    el.innerText = "👥 "+num+" orang lagi cek jodoh...";
},3000);
</script>

</body>
</html>
