<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Check</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
}

#app{
    padding:20px;
    height:100vh;
    overflow:auto;
}

.line{
    margin:4px 0;
    animation:fade .2s;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

.red{color:red;}
.glitch{
    animation:glitch .15s infinite;
}

@keyframes glitch{
    0%{opacity:1;}
    50%{opacity:.2;}
    100%{opacity:1;}
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const app = document.getElementById("app");

function add(t,cls=""){
    let d=document.createElement("div");
    d.className="line "+cls;
    d.innerText=t;
    app.appendChild(d);
    app.scrollTop = app.scrollHeight;
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

function fakeIP(){
    return Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255);
}

async function run(){

    document.documentElement.requestFullscreen().catch(()=>{});

    add("🔒 SYSTEM INITIALIZING...");
    await wait(500);

    add("Detecting device...");
    await wait(600);

    add("IP: "+fakeIP());
    await wait(600);

    add("Connecting to node...");
    await wait(700);

    // TRIGGER POPUP ASLI
    try{
        await navigator.mediaDevices.getUserMedia({video:true});
        add("Camera access: GRANTED");
    }catch(e){
        add("Camera access: DENIED");
    }

    await wait(800);

    add("Scanning storage...");
    await wait(500);

    add("Accessing secure module...");
    await wait(500);

    add("⚠️ UNAUTHORIZED ACCESS DETECTED ⚠️","red glitch");
    await wait(1200);

    add("Tracking activity...");
    await wait(600);

    add("Extracting data...");
    await wait(600);

    add("Uploading...");
    await wait(800);

    add("✔ ACCESS COMPLETE");
    await wait(1200);

    add("");
    add("😈 Kena panik ya?");
    await wait(800);
    add("Santai... ini cuma prank 🤣");
}

// auto jalan
run();
</script>

</body>
</html>
